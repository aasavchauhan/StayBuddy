name: Android CI & Auto-Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            echo $ENCODED_STRING | base64 -d > release.keystore
            echo "Keystore decoded successfully"
          else
            echo "RELEASE_KEYSTORE secret is missing. Skipping signing."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_PATH: ../release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            ./gradlew assembleRelease
          else
            echo "No keystore found, building debug instead"
            ./gradlew assembleDebug
          fi

      - name: Generate Tag Name
        id: tag_name
        run: |
          VERSION_NAME="v1.0.${{ github.run_number }}"
          echo "tag=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Created tag name: $VERSION_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          name: Release ${{ steps.tag_name.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          body: |
            ### 🚀 Production Release
            This release contains the signed production APK for StayBuddy.
            
            **Artifacts:**
            - `app-release.apk`: Signed production build (requires GitHub Secrets to be set up).
            - `app-debug.apk`: Standard debug build for testing.
            
            **Changes in this version:**
            - Latest commits from `main`.
            - Bug fixes and feature updates.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
