name: Android CI & Auto-Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Generate Tag Name
        id: tag_name
        run: |
          VERSION_NAME="v1.0.${{ github.run_number }}"
          echo "tag=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Created tag name: $VERSION_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          name: Release ${{ steps.tag_name.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/app-debug.apk
          body: |
            ### 🚀 Automated Build
            This release was automatically generated from a push to the `main` branch.
            
            **Changes in this version:**
            - Latest commits pushed to `main`.
            
            **Artifacts:**
            - `app-debug.apk`: Standard debug build for testing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
